<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout stack">
      <header class="topbar">
        <div class="brand">
          <h1 id="tracker-heading">Tracker</h1>
          <p id="architecture-label">Loading architecture...</p>
        </div>
        <div class="actions">
          <a class="button-link secondary" href="/">Home</a>
          <button id="logout-button" type="button" class="secondary">Logout</button>
        </div>
      </header>

      <section class="grid two">
        <form id="meal-form" class="panel stack">
          <h2>Add Meal Entry</h2>
          <div>
            <label for="mealName">Meal Name</label>
            <input id="mealName" name="mealName" required />
          </div>
          <div>
            <label for="eatenOn">Date</label>
            <input id="eatenOn" name="eatenOn" type="date" required />
          </div>
          <div>
            <label for="calories">Calories</label>
            <input id="calories" name="calories" type="number" min="1" required />
          </div>
          <div class="grid two">
            <div>
              <label for="protein">Protein (g)</label>
              <input id="protein" name="protein" type="number" min="0" required />
            </div>
            <div>
              <label for="carbs">Carbs (g)</label>
              <input id="carbs" name="carbs" type="number" min="0" required />
            </div>
          </div>
          <div>
            <label for="fat">Fat (g)</label>
            <input id="fat" name="fat" type="number" min="0" required />
          </div>
          <div class="actions">
            <button type="submit">Save Meal</button>
          </div>
          <p id="meal-message" class="message"></p>
        </form>

        <section class="panel stack">
          <h2>This Week</h2>
          <div class="summary-grid" id="summary-grid"></div>
          <div>
            <h3>Daily Totals</h3>
            <ul id="daily-summary" class="meal-list"></ul>
          </div>
        </section>
      </section>

      <section class="panel stack">
        <h2>Recent Meals</h2>
        <ul id="meal-list" class="meal-list"></ul>
      </section>
    </main>

    <script src="/tracker/index.js"></script>
  </body>
</html>
